<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #2a2a2a; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); margin-bottom: 10px; padding: 10px 20px; border-radius: 5px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #f55; color: #fff; }
        .main-content { padding: 20px; }
        .table-wrap { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <a th:href="@{/admin}" class="text-center mb-4 fs-4 fw-bold text-white text-decoration-none d-block">HEXA ADMIN</a>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fa fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/category}"><i class="fa fa-list me-2"></i> Categories</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/product}"><i class="fa fa-box me-2"></i> Products</a></li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý Sản phẩm</h1>
                    <a th:href="@{/admin/product/add}" class="btn btn-success"><i class="fa fa-plus"></i> Thêm mới</a>
                </div>

                <div class="table-wrap mb-4">
                    <form th:action="@{/admin/product}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <input type="text" name="name" class="form-control" placeholder="Tìm tên sản phẩm..." th:value="${name}">
                        </div>
                        <div class="col-md-4">
                            <select name="categoryId" class="form-select">
                                <option value="0">-- Tất cả danh mục --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == categoryId}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100"><i class="fa fa-search"></i> Lọc</button>
                        </div>
                    </form>
                </div>

                <div class="table-wrap">
                    <table class="table table-hover table-bordered align-middle text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Hình ảnh</th>
                                <th>Tên sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Giá bán</th>
                                <th>Nổi bật</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${products}">
                                <td th:text="${p.id}"></td>
                                <td>
                                    <img th:if="${p.avatar != null}" th:src="@{${p.avatar}}" class="product-img" alt="Ảnh SP">
                                    <span th:unless="${p.avatar != null}" class="text-muted small">Chưa có ảnh</span>
                                </td>
                                <td class="text-start fw-bold" th:text="${p.name}"></td>
                                <td th:text="${p.category != null ? p.category.name : 'Không có'}"></td>
                                <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' $'"></td>
                                <td><i th:if="${p.isHot}" class="fa fa-fire text-danger"></i></td>
                                <td>
                                    <span th:if="${p.status}" class="badge bg-success">Đang bán</span>
                                    <span th:unless="${p.status}" class="badge bg-secondary">Ngừng bán</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/product/edit(id=${p.id})}" class="btn btn-sm btn-warning"><i class="fa fa-edit"></i></a>
                                    <a th:href="@{/admin/product/delete(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Khóa sản phẩm này?');"><i class="fa fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${products.empty}">
                                <td colspan="8" class="text-muted py-3">Không tìm thấy sản phẩm nào.</td>
                            </tr>
                        </tbody>
                    </table>

                    <nav th:if="${productsPage.totalPages > 1}">
                        <ul class="pagination justify-content-end">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/product(page=${currentPage - 1}, name=${name}, categoryId=${categoryId})}">Trước</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, productsPage.totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                                <a class="page-link" th:text="${i + 1}" th:href="@{/admin/product(page=${i}, name=${name}, categoryId=${categoryId})}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == productsPage.totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/product(page=${currentPage + 1}, name=${name}, categoryId=${categoryId})}">Sau</a>
                            </li>
                        </ul>
                    </nav>

                </div>
            </main>
        </div>
    </div>
</body>
</html>

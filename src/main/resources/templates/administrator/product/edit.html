<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật Sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #2a2a2a; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); margin-bottom: 10px; padding: 10px 20px; border-radius: 5px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #f55; color: #fff; }
        .main-content { padding: 20px; }
        .form-wrap { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        .current-img { max-width: 150px; border-radius: 5px; border: 1px dashed #ccc; padding: 3px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <a th:href="@{/admin}" class="text-center mb-4 fs-4 fw-bold text-white text-decoration-none d-block">HEXA ADMIN</a>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fa fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/category}"><i class="fa fa-list me-2"></i> Categories</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/product}"><i class="fa fa-box me-2"></i> Products</a></li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2">Cập nhật: <span class="text-primary" th:text="${product.name}"></span></h1>
                    <a th:href="@{/admin/product}" class="btn btn-secondary"><i class="fa fa-arrow-left"></i> Quay lại</a>
                </div>

                <div class="form-wrap">
                    <div th:if="${saveError}" class="alert alert-danger">Có lỗi khi lưu dữ liệu!</div>

                    <form th:action="@{/admin/product/edit/save(id=${product.id})}" method="post" th:object="${productDto}" enctype="multipart/form-data">
                        
                        <div class="row">
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên sản phẩm <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Giá bán ($) <span class="text-danger">*</span></label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{price}" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Giá khuyến mãi ($)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{salePrice}">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Mô tả ngắn</label>
                                    <textarea class="form-control" rows="2" th:field="*{shortDescription}"></textarea>
                                </div>
                            </div>

                            <div class="col-md-4 border-start">
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold d-block text-start">Ảnh hiện tại</label>
                                    <img th:if="${product.avatar != null}" th:src="@{${product.avatar}}" class="current-img" alt="Ảnh SP">
                                    <div th:unless="${product.avatar != null}" class="text-muted small mb-2">Sản phẩm chưa có ảnh</div>
                                    
                                    <input type="file" class="form-control form-control-sm mt-2" th:field="*{avatarFile}" accept="image/*">
                                    <small class="text-muted">Chọn ảnh mới nếu muốn thay đổi</small>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Thuộc Danh mục <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{categoryId}" th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid' : ''">
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                                </div>

                                <div class="mb-3 mt-4">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{isHot}" id="isHotCheck">
                                        <label class="form-check-label fw-bold text-danger" for="isHotCheck">Sản phẩm Nổi Bật (Hot)</label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{status}" id="statusCheck">
                                        <label class="form-check-label fw-bold text-success" for="statusCheck">Đang bán (Hiển thị)</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả chi tiết</label>
                            <textarea class="form-control" rows="5" th:field="*{detailDescription}"></textarea>
                        </div>

                        <hr class="my-4">
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-warning"><i class="fa fa-save"></i> Cập Nhật</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
</body>
</html>

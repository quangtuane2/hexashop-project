<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới Sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #2a2a2a; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); margin-bottom: 10px; padding: 10px 20px; border-radius: 5px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #f55; color: #fff; }
        .main-content { padding: 20px; }
        .form-wrap { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <a th:href="@{/admin}" class="text-center mb-4 fs-4 fw-bold text-white text-decoration-none d-block">HEXA ADMIN</a>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fa fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/category}"><i class="fa fa-list me-2"></i> Categories</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/product}"><i class="fa fa-box me-2"></i> Products</a></li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2">Thêm Mới Sản Phẩm</h1>
                    <a th:href="@{/admin/product}" class="btn btn-secondary"><i class="fa fa-arrow-left"></i> Quay lại</a>
                </div>

                <div class="form-wrap">
                    <div th:if="${saveError}" class="alert alert-danger">Có lỗi khi lưu dữ liệu!</div>

                    <form th:action="@{/admin/product/add/save}" method="post" th:object="${productDto}" enctype="multipart/form-data">
                        
                        <div class="row">
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên sản phẩm <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Giá bán ($) <span class="text-danger">*</span></label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{price}" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Giá khuyến mãi ($)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{salePrice}">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Mô tả ngắn</label>
                                    <textarea class="form-control" rows="2" th:field="*{shortDescription}"></textarea>
                                </div>
                                
                                <div class="card mb-4 shadow-sm border-success">
								    <div class="card-header bg-light d-flex justify-content-between align-items-center">
								        <h6 class="mb-0 text-success"><i class="fa fa-tags"></i> Phân loại Màu sắc & Kích thước</h6>
								        <button type="button" class="btn btn-sm btn-outline-success" onclick="addMoreVariantRow()">
								            <i class="fa fa-plus"></i> Thêm phân loại
								        </button>
								    </div>
								    <div class="card-body p-0">
								        <div class="table-responsive">
								            <table class="table table-bordered text-center align-middle mb-0">
								                <thead class="table-light">
								                    <tr>
								                        <th>Màu sắc</th>
								                        <th>Kích thước</th>
								                        <th>Số lượng tồn kho</th>
								                        <th style="width: 50px;">Xóa</th>
								                    </tr>
								                </thead>
								                <tbody id="variant-container">
								                    <tr class="variant-row d-none" id="variant-template">
								                        <td><input type="text" class="form-control color-input" placeholder="VD: Đen, Trắng..."></td>
								                        <td><input type="text" class="form-control text-uppercase size-input" placeholder="S, M, L..."></td>
								                        <td><input type="number" class="form-control stock-input" value="10" min="0"></td>
								                        <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)"><i class="fa fa-trash"></i></button></td>
								                    </tr>
								                </tbody>
								            </table>
								        </div>
								    </div>
								</div>
								
								<div class="card mb-4 shadow-sm border-primary">
								    <div class="card-header bg-light d-flex justify-content-between align-items-center">
								        <h6 class="mb-0 text-primary"><i class="fa fa-images"></i> Ảnh phụ của sản phẩm</h6>
								        <button type="button" class="btn btn-sm btn-outline-primary" onclick="addMoreImageRow()">
								            <i class="fa fa-plus"></i> Thêm ảnh
								        </button>
								    </div>
								    <div class="card-body">
								        <div id="image-container">
								            <div class="row align-items-center mb-3 image-row d-none" id="image-template">
								                <div class="col-md-2 text-center text-muted"><i class="fa fa-image fa-2x"></i></div>
								                <div class="col-md-4">
								                    <input type="text" class="form-control title-input" placeholder="Tiêu đề ảnh (tùy chọn)">
								                </div>
								                <div class="col-md-5">
								                    <input type="file" class="form-control file-input" accept="image/*">
								                </div>
								                <div class="col-md-1">
								                    <button type="button" class="btn btn-danger btn-sm w-100" onclick="removeRow(this)"><i class="fa fa-trash"></i></button>
								                </div>
								            </div>
								        </div>
								    </div>
								</div>
                            </div>

                            <div class="col-md-4 border-start">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Ảnh đại diện</label>
                                    <input type="file" class="form-control" th:field="*{avatarFile}" accept="image/*">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Thuộc Danh mục <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{categoryId}" th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid' : ''">
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                                </div>

                                <div class="mb-3 mt-4">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{isHot}" id="isHotCheck">
                                        <label class="form-check-label fw-bold text-danger" for="isHotCheck">Sản phẩm Nổi Bật (Hot)</label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{status}" id="statusCheck" checked>
                                        <label class="form-check-label fw-bold text-success" for="statusCheck">Đang bán (Hiển thị)</label>
                                    </div>
                                </div>
                            </div>   
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả chi tiết</label>
                            <textarea class="form-control" rows="5" th:field="*{detailDescription}"></textarea>
                        </div>     
						
                        <hr class="my-4">
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-success"><i class="fa fa-save"></i> Lưu Sản Phẩm</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
    
    <script th:src="@{/admin_assets/js/script.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh mục - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #2a2a2a; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); margin-bottom: 10px; padding: 10px 20px; border-radius: 5px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #f55; color: #fff; }
        .main-content { padding: 20px; }
        .table-wrap { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <a th:href="@{/admin}" class="text-center mb-4 fs-4 fw-bold text-white text-decoration-none d-block">HEXA ADMIN</a>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin}"><i class="fa fa-home me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin/category}"><i class="fa fa-list me-2"></i> Categories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/product}"><i class="fa fa-box me-2"></i> Products</a>
                    </li>
                    <li class="nav-item">
                         <a class="nav-link" href="#">
                             <i class="fa fa-shopping-bag"></i> Orders
                         </a>
                     </li>
                     <li class="nav-item">
                         <a class="nav-link" href="#">
                             <i class="fa fa-users"></i> Customers
                         </a>
                     </li>
                     <li class="nav-item">
                         <a class="nav-link" href="#">
                             <i class="fa fa-cog"></i> Settings
                         </a>
                     </li>
                     <li class="nav-item mt-5">
                         <a class="nav-link text-danger" href="index.html">
                             <i class="fa fa-sign-out-alt"></i> Logout
                         </a>
                     </li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý Danh mục</h1>
                    <a th:href="@{/admin/category/add}" class="btn btn-success"><i class="fa fa-plus"></i> Thêm mới</a>
                </div>

                <div class="table-wrap mb-4">
                    <form th:action="@{/admin/category}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <input type="text" name="name" class="form-control" placeholder="Tìm theo tên..." th:value="${name}">
                        </div>
                        <div class="col-md-3">
                            <input type="date" name="fromDate" class="form-control" th:value="${fromDate}">
                        </div>
                        <div class="col-md-3">
                            <input type="date" name="toDate" class="form-control" th:value="${toDate}">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100"><i class="fa fa-search"></i> Lọc</button>
                        </div>
                    </form>
                </div>

                <div class="table-wrap">
                    <table class="table table-hover table-bordered align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Tên danh mục</th>
                                <th>Mô tả</th>
                                <th>Ngày tạo</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat : ${categories}">
                                <td th:text="${cat.id}">1</td>
                                <td th:text="${cat.name}">Tên mẫu</td>
                                <td th:text="${cat.description}">Mô tả mẫu</td>
                                <td th:text="${#dates.format(cat.createDate, 'dd/MM/yyyy')}">01/01/2023</td>
                                <td>
                                    <span th:if="${cat.status}" class="badge bg-success">Hoạt động</span>
                                    <span th:unless="${cat.status}" class="badge bg-danger">Đã khóa</span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/admin/category/edit(id=${cat.id}, page=${currentPage})}" class="btn btn-sm btn-warning"><i class="fa fa-edit"></i></a>
                                    <button type="button" class="btn btn-sm btn-danger" 
                                    		th:onclick="deleteCategoryAjax(this, [[${cat.id}]])">
									    <i class="fa fa-trash"></i>
									</button>	
                                </td>
                            </tr>
                            
                            <tr th:if="${categories.empty}">
                                <td colspan="6" class="text-center text-muted py-3">Không tìm thấy danh mục nào.</td>
                            </tr>
                        </tbody>
                    </table>

                    <nav th:if="${categoriesPage.totalPages > 1}" aria-label="Page navigation">
                        <ul class="pagination justify-content-end">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/category(page=${currentPage - 1}, name=${name}, fromDate=${fromDate}, toDate=${toDate})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, categoriesPage.totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                                <a class="page-link" th:text="${i + 1}" th:href="@{/admin/category(page=${i}, name=${name}, fromDate=${fromDate}, toDate=${toDate})}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == categoriesPage.totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/category(page=${currentPage + 1}, name=${name}, fromDate=${fromDate}, toDate=${toDate})}">Next</a>
                            </li>
                        </ul>
                    </nav>

                </div>
            </main>
        </div>
    </div>
    
    <script th:src="@{/admin_assets/js/script.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Đơn hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #2a2a2a; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); margin-bottom: 10px; padding: 10px 20px; border-radius: 5px; }
        .sidebar .nav-link.active { background-color: #f55; color: #fff; }
        .main-content { padding: 20px; }
        .info-box { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .product-img { width: 50px; height: 65px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <a th:href="@{/admin}" class="text-center mb-4 fs-4 fw-bold text-white d-block text-decoration-none">HEXA ADMIN</a>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fa fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/orders}"><i class="fa fa-shopping-bag me-2"></i> Orders</a></li>
                </ul>
            </nav>

            <main class="col-md-9 col-lg-10 main-content">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
                    <h2>Chi tiết đơn hàng: <span class="text-primary" th:text="${order.code}"></span></h2>
                    <a th:href="@{/admin/orders}" class="btn btn-secondary"><i class="fa fa-arrow-left"></i> Quay lại</a>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="info-box">
                            <h5 class="border-bottom pb-2 mb-3"><i class="fa fa-user me-2"></i>Thông tin khách hàng</h5>
                            <p><strong>Họ tên:</strong> <span th:text="${order.customerName}"></span></p>
                            <p><strong>SĐT:</strong> <span th:text="${order.customerMobile}"></span></p>
                            <p><strong>Email:</strong> <span th:text="${order.customerEmail}"></span></p>
                            <p><strong>Địa chỉ:</strong> <span th:text="${order.customerAddress}"></span></p>
                            <p><strong>Ghi chú:</strong> <span th:text="${order.description}"></span></p>
                        </div>

                        <div class="info-box border-primary">
                            <h5 class="border-bottom pb-2 mb-3 text-primary"><i class="fa fa-edit me-2"></i>Cập nhật trạng thái</h5>
                            <form th:action="@{/admin/orders/update-status}" method="post">
                                <input type="hidden" name="orderId" th:value="${order.id}">
                                <select name="statusName" class="form-select mb-3">
                                    <option value="Pending" th:selected="${order.orderStatus.name == 'Pending'}">Chờ xác nhận</option>
                                    <option value="Shipping" th:selected="${order.orderStatus.name == 'Shipping'}">Đang giao hàng</option>
                                    <option value="Delivered" th:selected="${order.orderStatus.name == 'Delivered'}">Đã giao thành công</option>
                                    <option value="Cancelled" th:selected="${order.orderStatus.name == 'Cancelled'}">Hủy đơn hàng</option>
                                </select>
                                <button type="submit" class="btn btn-primary w-100">Cập nhật ngay</button>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="info-box">
                            <h5 class="border-bottom pb-2 mb-3"><i class="fa fa-shopping-cart me-2"></i>Sản phẩm đã đặt</h5>
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th class="text-center">Số lượng</th>
                                        <th class="text-end">Đơn giá</th>
                                        <th class="text-end">Thành tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="op : ${order.saleOrderProducts}">
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <div>
                                                    <div class="fw-bold" th:text="${op.name}"></div>
                                                    <small class="text-muted" th:text="${op.description}"></small>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="text-center" th:text="${op.quantity}"></td>
                                        <td class="text-end" th:text="${#numbers.formatDecimal(op.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                        <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(op.price * op.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold">TỔNG CỘNG:</td>
                                        <td class="text-end fw-bold text-danger fs-5" th:text="${#numbers.formatDecimal(order.total, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>

server.port=9090

# Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/hexashop-project?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Upload File Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# Gmail SMTP Configuration
# Hướng dẫn lấy App Password:
#   1. Vào Google Account -> Bảo mật
#   2. Bật Xác minh 2 bước (nếu chưa bật)
#   3. Tìm "App passwords" -> Tạo mật khẩu 16 ký tự
#   4. Dán vào spring.mail.password bên dưới
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username= 
spring.mail.password= 
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Base URL của app (dùng để tạo link xác minh email)
app.base-url=http://localhost:9090
